<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Mobile Immersive</title>
    <style>
        /* === TIKTOK STYLE MOBILE-FIRST RESET === */
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #00f2fe; /* Ciano estilo neon */
            --danger: #ff0050; /* Vermelho TikTok */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            width: 100vw;
            height: 100dvh; /* Evita que o teclado/barra do Chrome quebre o layout */
            overflow: hidden;
            position: relative;
        }
        svg { width: 20px; height: 20px; flex-shrink: 0; }
        .hidden { display: none !important; }
        /* === SCREENS === */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }
        /* === LOGIN & FORMS === */
        .glass-panel {
            margin: auto; width: 90%; max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 30px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .glass-panel h2 { margin: 0 0 4px 0; text-align: center; font-size: 28px; font-weight: 800; letter-spacing: 1px; color: var(--accent); }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: rgba(255, 255, 255, 0.1); color: white; font-size: 16px; outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.4); }
        input:focus { border: 1px solid var(--accent); background: rgba(255, 255, 255, 0.15); }
        button { font-family: inherit; }
        button.btn-primary {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: var(--accent); color: #000; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: transform 0.1s;
        }
        button.btn-primary:active { transform: scale(0.97); }
        button.btn-ghost {
            width: 100%; padding: 14px; border-radius: 12px; cursor: pointer;
            background: rgba(255,255,255,0.06); color: var(--text-main);
            border: 1px solid var(--glass-border); font-size: 14px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .hint-text { margin: -6px 0 0 0; font-size: 12px; line-height: 1.5; color: var(--text-muted); }
        .hint-text strong { color: var(--accent); font-weight: 600; }

        .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; color: var(--text-muted); gap: 10px; }
        .toggle-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); flex-shrink: 0; }

        /* === ICON BUTTONS (usados no lugar de emojis na estrutura do app) === */
        .icon-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.1); color: white;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; flex-shrink: 0;
        }
        .icon-btn.danger { background: rgba(255, 0, 80, 0.15); color: var(--danger); }

        /* === BOTÃO VOLTAR (grande, visível, alvo de toque confortável) === */
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.12); border: 1px solid var(--glass-border);
            color: var(--text-main); padding: 10px 16px 10px 12px; min-height: 44px;
            border-radius: 24px; font-size: 14px; font-weight: 700; cursor: pointer;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .back-btn:active { background: rgba(255,255,255,0.2); }

        /* === TOP BAR PADRÃO (chat e criar grupo) === */
        .top-bar {
            padding: 16px 15px; display: flex; align-items: center; gap: 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 100%);
            flex-shrink: 0; position: relative; z-index: 5;
        }
        .top-bar h3 { margin: 0; font-size: 17px; flex: 1; text-align: center; padding-right: 44px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        /* === DASHBOARD (LISTAS) === */
        .dash-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .user-info { display: flex; flex-direction: column; gap: 4px; background: none; border: none; cursor: pointer; text-align: left; padding: 0; }
        .user-info .name { font-size: 18px; font-weight: bold; }
        .user-info .status { font-size: 12px; color: var(--accent); }

        /* === TABS (Conversas / Online / Perfil) === */
        .tab-bar { display: flex; gap: 6px; padding: 0 16px 14px; flex-shrink: 0; }
        .tab-btn {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 4px; border-radius: 14px; border: 1px solid transparent; cursor: pointer;
            background: rgba(255,255,255,0.05); color: var(--text-muted); font-size: 12px; font-weight: 700;
        }
        .tab-btn svg { width: 17px; height: 17px; }
        .tab-btn.active { background: var(--glass-bg); border-color: var(--accent); color: var(--accent); }
        .tab-badge {
            min-width: 18px; height: 18px; padding: 0 4px; border-radius: 9px; background: var(--danger);
            color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center;
        }
        .tab-content { display: none; flex: 1; min-height: 0; flex-direction: column; }
        .tab-content.active { display: flex; }
        .tab-content-header {
            padding: 0 20px 10px; display: flex; justify-content: space-between; align-items: center;
            color: var(--text-muted); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .btn-mini {
            display: flex; align-items: center; gap: 6px; width: auto; padding: 8px 14px;
            border-radius: 20px; background: var(--accent); color: #000; border: none;
            font-size: 12px; font-weight: 800; cursor: pointer; text-transform: none; letter-spacing: 0;
        }

        .scroll-list { flex: 1; overflow-y: auto; padding: 0 20px; margin: 0; list-style: none; padding-bottom: 30px; }
        .scroll-list::-webkit-scrollbar { display: none; } /* Oculta scrollbar */
        .list-item {
            padding: 18px 20px; background: var(--glass-bg); margin-bottom: 12px;
            border-radius: 16px; border: 1px solid var(--glass-border); cursor: pointer;
            display: flex; align-items: center; gap: 14px; font-size: 16px; font-weight: 500;
        }
        .list-item:active { background: rgba(255,255,255,0.14); }
        .list-item .list-icon {
            width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent);
        }
        .list-item .list-title { flex: 1; }
        .list-item .list-title small { display: block; color: var(--text-muted); font-size: 11px; font-weight: 400; margin-top: 2px; }
        .online-indicator { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); flex-shrink: 0; }
        .empty-state { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 14px; line-height: 1.6; }

        /* === PERFIL === */
        .profile-scroll { flex: 1; overflow-y: auto; padding: 6px 20px 30px; display: flex; flex-direction: column; gap: 14px; }
        .profile-scroll::-webkit-scrollbar { display: none; }
        .profile-avatar-preview {
            width: 84px; height: 84px; border-radius: 50%; margin: 6px auto 4px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center; font-size: 40px;
        }

        /* === TELA DE CHAT === */
        #chat-screen { background: #000; }
        /* Area de mensagens ocupa o espaço restante */
        #messages-container {
            flex: 1; overflow-y: scroll; padding: 10px 15px 15px;
            display: flex; flex-direction: column; gap: 15px; min-height: 0;
        }
        #messages-container::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4;
            animation: slideUp 0.3s ease-out forwards; position: relative; word-break: break-word;
            display: flex; flex-direction: column; gap: 4px; transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .msg.fade-out { opacity: 0; transform: scale(0.9); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .msg.received { align-self: flex-start; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-bottom-left-radius: 4px; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
        .msg.uploading { opacity: 0.6; font-style: italic; }
        .msg-sender-label { font-size: 11px; font-weight: 800; opacity: 0.75; }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .msg-text { flex: 1; }
        .ttl-badge {
            font-size: 10px; font-weight: 800; opacity: 0.6; flex-shrink: 0;
            padding: 2px 6px; border-radius: 8px; background: rgba(0,0,0,0.15);
        }
        .msg.received .ttl-badge { background: rgba(255,255,255,0.12); }

        .msg.msg-media { padding: 10px; gap: 6px; }
        .media-lock-row {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 13px; font-weight: 600; padding: 16px 10px; cursor: pointer;
        }
        .media-lock-row:active { opacity: 0.7; }
        .media-lock-row svg { width: 22px; height: 22px; }
        .media-frame { width: 100%; display: block; }
        .msg-media img.media-frame { border-radius: 12px; max-height: 320px; object-fit: cover; }
        .msg-media iframe.media-frame { border: 0; height: 220px; border-radius: 12px; }
        .media-footer { display: flex; justify-content: flex-end; }
        #chat-empty-hint { padding: 60px 30px; }

        /* Painel de anexos */
        .attach-tray {
            display: none; gap: 14px; justify-content: center; margin: 0 12px 8px;
            background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .attach-tray.open { display: flex; }
        .attach-option { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .attach-option span { font-size: 10px; color: var(--text-muted); font-weight: 600; }
        #attach-toggle-btn svg { transition: transform 0.2s ease; }
        #attach-toggle-btn.open svg { transform: rotate(45deg); }

        /* Input Inferior Pill */
        .bottom-input-bar {
            flex-shrink: 0; margin: 0 12px 12px; display: flex; align-items: center; gap: 6px;
            background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 6px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
        }
        .bottom-input-bar input[type="text"] {
            flex: 1; background: transparent; border: none; color: white; font-size: 15px;
            padding: 10px 15px; outline: none; margin: 0;
        }
        .bottom-input-bar .icon-btn { width: 40px; height: 40px; }
        .btn-send {
            background: var(--accent); color: #000; border: none; border-radius: 50%;
            width: 40px; height: 40px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; flex-shrink: 0;
        }
        .btn-send svg { margin-left: -2px; }

        /* Barra de gravação de áudio */
        .recording-bar {
            display: none; align-items: center; gap: 10px; flex-shrink: 0;
            margin: 0 12px 12px; background: rgba(30,30,30,0.9); backdrop-filter: blur(15px);
            padding: 8px 8px 8px 16px; border-radius: 30px; border: 1px solid rgba(255,0,80,0.35);
        }
        .recording-bar.open { display: flex; }
        .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); animation: pulse 1s infinite; flex-shrink: 0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
        #recording-time { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .rec-hint { flex: 1; font-size: 12px; color: var(--text-muted); }

        /* === TOAST (substitui alert()) === */
        .toast {
            position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
            background: rgba(20,20,20,0.95); color: #fff; padding: 12px 20px; border-radius: 24px;
            font-size: 13px; font-weight: 600; border: 1px solid var(--glass-border);
            opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease; z-index: 999; max-width: 85vw; text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen active">
            <div class="glass-panel">
                <h2>PHANTOM</h2>
                <p class="hint-text">Escolha um <strong>apelido que não te identifique</strong>. Nada de nome real — o anonimato é a regra aqui.</p>
                <input type="text" id="username" placeholder="Apelido Anônimo (ex: Raposa Ruiva)">
                <button type="button" class="btn-ghost" onclick="App.suggestName('username')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                    Sugerir apelido anônimo
                </button>
                <input type="password" id="password" placeholder="Chave Secreta">
                <input type="text" id="emoji" placeholder="Avatar (Ex: 🦊)">
                <div class="toggle-row">
                    <label for="is-invisible">Operar como Fantasma (Invisível)</label>
                    <input type="checkbox" id="is-invisible">
                </div>
                <button class="btn-primary" onclick="App.auth()">ACESSAR</button>
            </div>
        </div>
        <div id="dashboard-screen" class="screen">
            <div class="dash-header">
                <button class="user-info" onclick="App.switchTab('profile')" title="Editar perfil">
                    <span class="name" id="my-profile">Nome</span>
                    <span class="status" id="status-text">Status</span>
                </button>
                <button class="icon-btn danger" onclick="App.logout()" title="Sair" aria-label="Sair">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" id="tab-btn-chats" onclick="App.switchTab('chats')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"></path></svg>
                    Conversas
                </button>
                <button class="tab-btn" id="tab-btn-online" onclick="App.switchTab('online')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg>
                    Online <span class="tab-badge" id="online-count-badge">0</span>
                </button>
                <button class="tab-btn" id="tab-btn-profile" onclick="App.switchTab('profile')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Perfil
                </button>
            </div>

            <div class="tab-content active" id="tab-chats">
                <div class="tab-content-header">
                    <span>Suas sessões</span>
                    <button class="btn-mini" onclick="App.showNewGroupScreen()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Novo grupo
                    </button>
                </div>
                <ul class="scroll-list" id="groups-list"></ul>
            </div>

            <div class="tab-content" id="tab-online">
                <div class="tab-content-header">
                    <span id="online-count-text">0 online agora</span>
                </div>
                <ul class="scroll-list" id="online-users-list"></ul>
            </div>

            <div class="tab-content" id="tab-profile">
                <div class="tab-content-header"><span>Seu perfil</span></div>
                <div class="profile-scroll">
                    <div class="profile-avatar-preview" id="profile-avatar-preview">🕵️</div>
                    <input type="text" id="profile-emoji" placeholder="Avatar (Ex: 🦊)">
                    <p class="hint-text">Apelido anônimo — evite usar seu nome real.</p>
                    <input type="text" id="profile-name" placeholder="Apelido">
                    <button type="button" class="btn-ghost" onclick="App.suggestName('profile-name')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                        Sugerir apelido
                    </button>
                    <input type="password" id="profile-password" placeholder="Nova chave secreta (opcional)">
                    <div class="toggle-row">
                        <label for="profile-invisible">Operar como Fantasma (Invisível)</label>
                        <input type="checkbox" id="profile-invisible">
                    </div>
                    <button class="btn-primary" onclick="App.saveProfile()">Salvar alterações</button>
                </div>
            </div>
        </div>

        <div id="create-group-screen" class="screen">
            <div class="top-bar">
                <button class="back-btn" onclick="App.switchScreen('dashboard-screen')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    Voltar
                </button>
                <h3>Novo Grupo</h3>
            </div>
            <div class="glass-panel" style="margin: 10px auto; max-height: 80vh; overflow: hidden; flex: 1;">
                <input type="text" id="group-name" placeholder="Nome do Chat">
                <div id="users-selection" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
                <button class="btn-primary" onclick="App.createGroup()">Iniciar Sessão</button>
            </div>
        </div>

        <div id="chat-screen" class="screen">
            <div class="top-bar">
                <button class="back-btn" onclick="App.backToDash()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    Voltar
                </button>
                <h3 id="current-group-name">Grupo</h3>
            </div>
            <div id="messages-container"></div>

            <div class="attach-tray" id="attach-tray">
                <button class="attach-option" onclick="App.triggerFile('media-upload')" aria-label="Galeria">
                    <span class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"></path></svg></span>
                    <span>Galeria</span>
                </button>
                <button class="attach-option" onclick="App.triggerFile('camera-input')" aria-label="Câmera">
                    <span class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></span>
                    <span>Câmera</span>
                </button>
                <button class="attach-option" onclick="App.toggleRecording()" aria-label="Áudio">
                    <span class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path><path d="M19 10v2a7 7 0 01-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg></span>
                    <span>Áudio</span>
                </button>
            </div>

            <div class="bottom-input-bar" id="bottom-input-bar">
                <input type="file" id="media-upload" accept="image/*,video/*,audio/*" onchange="App.handleMedia(event)" hidden>
                <input type="file" id="camera-input" accept="image/*,video/*" capture="environment" onchange="App.handleMedia(event)" hidden>
                <button class="icon-btn" id="attach-toggle-btn" onclick="App.toggleAttachTray()" title="Anexar" aria-label="Anexar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <input type="text" id="msg-input" placeholder="Transmitir mensagem..." autocomplete="off">
                <button class="btn-send" onclick="App.sendTextMessage()" title="Enviar" aria-label="Enviar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>

            <div class="recording-bar" id="recording-bar">
                <span class="rec-dot"></span>
                <span id="recording-time">00:00</span>
                <span class="rec-hint">Gravando áudio…</span>
                <button class="icon-btn" onclick="App.cancelRecording()" title="Cancelar" aria-label="Cancelar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <button class="btn-send" onclick="App.stopRecording(true)" title="Enviar áudio" aria-label="Enviar áudio">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'SUA_URL_DO_APPS_SCRIPT_AQUI'; // <-- INSIRA SUA URL AQUI (URL de implantação do Code.gs)

        const ICONS = {
            image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
            video: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>',
            audio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path><path d="M19 10v2a7 7 0 01-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
            lock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>',
            users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg>',
            hash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>'
        };
        const MEDIA_LABEL = { image: 'a imagem', video: 'o vídeo', audio: 'o áudio' };

        class PhantomCore {
            constructor() {
                this.currentUser = null;
                this.currentGroup = null;
                this.chatUserMap = null;
                this.lastSync = 0;
                this.syncInterval = null;
                this.heartbeatInterval = null;
                this.MESSAGE_LIFESPAN = 10000; // texto some 10s após aparecer (igual para quem envia e recebe)
                this.MEDIA_LIFESPAN = 10000;   // mídia some 10s depois de ser aberta

                this.isRecording = false;
                this.mediaRecorder = null;
                this.recordedChunks = [];
                this.currentStream = null;
                this.recTimer = null;

                this.init();
                this.setupGlobalHandlers();
            }
            async request(action, payload) {
                payload.action = action;
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST', body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (!data.success) throw new Error(data.error);
                    return data.data;
                } catch (error) {
                    this.toast('Falha de comunicação: ' + error.message);
                    throw error;
                }
            }
            toast(message) {
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = message;
                document.body.appendChild(el);
                requestAnimationFrame(() => el.classList.add('show'));
                setTimeout(() => {
                    el.classList.remove('show');
                    setTimeout(() => el.remove(), 300);
                }, 3200);
            }
            switchScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
            }
            switchTab(tab) {
                ['chats', 'online', 'profile'].forEach(t => {
                    document.getElementById(`tab-btn-${t}`).classList.toggle('active', t === tab);
                    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
                });
                if (tab === 'profile') this.loadProfileForm();
            }
            suggestName(targetId) {
                const nouns = ['Raposa', 'Pantera', 'Coruja', 'Sombra', 'Fênix', 'Lobo', 'Cometa', 'Névoa', 'Aurora', 'Tempestade', 'Miragem', 'Eco'];
                const adjectives = ['Ruiva', 'Silenciosa', 'Elétrica', 'Sombria', 'Veloz', 'Discreta', 'Selvagem', 'Charmosa', 'Misteriosa', 'Gelada', 'Noturna', 'Feroz'];
                const name = `${nouns[Math.floor(Math.random() * nouns.length)]} ${adjectives[Math.floor(Math.random() * adjectives.length)]}`;
                document.getElementById(targetId || 'username').value = name;
            }
            init() {
                const session = localStorage.getItem('phantom_mobile_session');
                if (session) {
                    this.currentUser = JSON.parse(session);
                    this.loadDashboard();
                } else {
                    this.switchScreen('login-screen');
                }
            }
            async auth() {
                const name = document.getElementById('username').value.trim();
                const pass = document.getElementById('password').value.trim();
                const emoji = document.getElementById('emoji').value.trim() || '🕵️';
                const isInvisible = document.getElementById('is-invisible').checked;
                if (!name || !pass) return this.toast('Preencha apelido e chave secreta.');
                const btn = document.querySelector('#login-screen button.btn-primary');
                btn.innerText = 'PROCESSANDO...';
                try {
                    const user = await this.request('auth', { name, emoji, password: pass, isInvisible });
                    this.currentUser = user;
                    localStorage.setItem('phantom_mobile_session', JSON.stringify(user));
                    this.loadDashboard();
                } catch (e) {
                    btn.innerText = 'ACESSAR';
                }
            }
            logout() {
                clearInterval(this.heartbeatInterval);
                localStorage.removeItem('phantom_mobile_session');
                location.reload();
            }
            async loadDashboard() {
                this.switchScreen('dashboard-screen');
                document.getElementById('my-profile').innerText = `${this.currentUser.emoji} ${this.currentUser.name}`;
                document.getElementById('status-text').innerText = this.currentUser.isInvisible ? '● Invisível' : '● Visível';

                this.fetchGroups();
                this.runHeartbeat();
                if (!this.heartbeatInterval) {
                    this.heartbeatInterval = setInterval(() => this.runHeartbeat(), 10000);
                }
            }
            // === PERFIL ===
            loadProfileForm() {
                document.getElementById('profile-emoji').value = this.currentUser.emoji;
                document.getElementById('profile-name').value = this.currentUser.name;
                document.getElementById('profile-password').value = '';
                document.getElementById('profile-invisible').checked = !!this.currentUser.isInvisible;
                document.getElementById('profile-avatar-preview').textContent = this.currentUser.emoji;
            }
            async saveProfile() {
                const name = document.getElementById('profile-name').value.trim();
                const emoji = document.getElementById('profile-emoji').value.trim();
                const password = document.getElementById('profile-password').value.trim();
                const isInvisible = document.getElementById('profile-invisible').checked;
                if (!name || !emoji) return this.toast('Preencha apelido e avatar.');
                try {
                    const updated = await this.request('updateProfile', {
                        userId: this.currentUser.id, name, emoji, password: password || null, isInvisible
                    });
                    this.currentUser = { ...this.currentUser, ...updated };
                    localStorage.setItem('phantom_mobile_session', JSON.stringify(this.currentUser));
                    document.getElementById('my-profile').innerText = `${this.currentUser.emoji} ${this.currentUser.name}`;
                    document.getElementById('status-text').innerText = this.currentUser.isInvisible ? '● Invisível' : '● Visível';
                    document.getElementById('profile-password').value = '';
                    this.toast('Perfil atualizado.');
                } catch (e) { /* toast já exibido */ }
            }
            // === ONLINE / SESSÕES ===
            async runHeartbeat() {
                if (!this.currentUser) return;
                const onlineUsers = await this.request('heartbeat', {
                    userId: this.currentUser.id, isInvisible: this.currentUser.isInvisible
                });

                document.getElementById('online-count-badge').textContent = onlineUsers.length;
                document.getElementById('online-count-text').textContent =
                    onlineUsers.length === 1 ? '1 online agora' : `${onlineUsers.length} online agora`;

                const list = document.getElementById('online-users-list');
                if (!onlineUsers.length) {
                    list.innerHTML = '<li class="empty-state">Nenhum radar ativo no momento.</li>';
                    return;
                }
                list.innerHTML = '';
                onlineUsers.forEach(u => {
                    const li = document.createElement('li');
                    li.className = 'list-item';
                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'list-icon';
                    iconSpan.textContent = u.emoji;
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'list-title';
                    titleSpan.textContent = u.name;
                    const dot = document.createElement('span');
                    dot.className = 'online-indicator';
                    li.appendChild(iconSpan);
                    li.appendChild(titleSpan);
                    li.appendChild(dot);
                    li.onclick = () => this.openDirectChat(u);
                    list.appendChild(li);
                });
            }
            async fetchGroups() {
                const groups = await this.request('getGroups', { userId: this.currentUser.id });
                const list = document.getElementById('groups-list');
                if (!groups.length) {
                    list.innerHTML = '<li class="empty-state">Nenhuma sessão ainda. Toque em um usuário na aba Online para começar, ou crie um grupo.</li>';
                    return;
                }
                list.innerHTML = '';
                groups.forEach(g => {
                    const li = document.createElement('li');
                    li.className = 'list-item';
                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'list-icon';
                    iconSpan.innerHTML = g.type === 'direct' ? ICONS.users : ICONS.hash;
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'list-title';
                    titleSpan.textContent = g.name;
                    if (g.type === 'group') {
                        const small = document.createElement('small');
                        small.textContent = `${g.memberCount} membros`;
                        titleSpan.appendChild(small);
                    }
                    li.appendChild(iconSpan);
                    li.appendChild(titleSpan);
                    li.onclick = () => this.openChat(g);
                    list.appendChild(li);
                });
            }
            async openDirectChat(user) {
                try {
                    const res = await this.request('openDirect', { userId: this.currentUser.id, otherId: user.id });
                    this.openChat({ id: res.id, name: `${user.emoji} ${user.name}`, type: 'direct' });
                } catch (e) { /* toast já exibido */ }
            }
            async showNewGroupScreen() {
                this.switchScreen('create-group-screen');
                document.getElementById('group-name').value = '';
                const users = await this.request('getUsers', {});
                const container = document.getElementById('users-selection');
                container.innerHTML = '';
                const others = users.filter(u => u.id !== this.currentUser.id);
                if (!others.length) {
                    container.innerHTML = '<p class="empty-state" style="padding:10px 0;">Ainda não há outros usuários registrados.</p>';
                    return;
                }
                others.forEach(u => {
                    const label = document.createElement('label');
                    label.className = 'toggle-row';
                    label.style.cssText = 'background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;';
                    const span = document.createElement('span');
                    span.textContent = `${u.emoji} ${u.name}`;
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.value = u.id;
                    label.appendChild(span);
                    label.appendChild(checkbox);
                    container.appendChild(label);
                });
            }
            async createGroup() {
                const name = document.getElementById('group-name').value.trim() || 'Operação Oculta';
                const members = Array.from(document.querySelectorAll('#users-selection input:checked')).map(c => c.value);
                if (!members.length) return this.toast('Selecione ao menos uma pessoa.');
                members.push(this.currentUser.id);
                await this.request('createGroup', { name, members });
                this.switchScreen('dashboard-screen');
                this.switchTab('chats');
                this.fetchGroups();
            }
            // === CHAT ===
            openChat(group) {
                this.currentGroup = group;
                this.chatUserMap = null;
                // Só o que rolar a partir de AGORA é sincronizado — sem replay de histórico.
                this.lastSync = Date.now();
                document.getElementById('current-group-name').innerText = group.name;
                document.getElementById('messages-container').innerHTML =
                    '<div class="empty-state" id="chat-empty-hint">Nenhuma mensagem ainda.<br>Tudo que for enviado a partir de agora aparece aqui — e some pouco depois.</div>';
                this.closeAttachTray();
                this.switchScreen('chat-screen');
                clearInterval(this.syncInterval);
                if (group.type === 'group') {
                    this.request('getUsers', {}).then(users => {
                        this.chatUserMap = {};
                        users.forEach(u => { this.chatUserMap[u.id] = u; });
                    }).catch(() => {});
                }
                this.syncInterval = setInterval(() => this.syncMessages(), 3000);
            }
            backToDash() {
                clearInterval(this.syncInterval);
                if (this.isRecording) this.cancelRecording();
                this.currentGroup = null;
                this.switchScreen('dashboard-screen');
                this.fetchGroups();
            }
            async syncMessages() {
                if (!this.currentGroup) return;
                let messages;
                try {
                    messages = await this.request('syncMessages', {
                        groupId: this.currentGroup.id, userId: this.currentUser.id, lastTimestamp: this.lastSync
                    });
                } catch (e) { return; }
                messages.forEach(msg => {
                    if (msg.senderId === this.currentUser.id) return; // já renderizada de forma otimista ao enviar
                    this.renderMessage(msg);
                    this.lastSync = Math.max(this.lastSync, msg.timestamp);
                });
            }
            scrollToBottom() {
                const container = document.getElementById('messages-container');
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            }
            startCountdown(div, badgeEl, ms) {
                let remaining = Math.ceil(ms / 1000);
                badgeEl.textContent = remaining + 's';
                const tick = setInterval(() => {
                    remaining--;
                    if (remaining <= 0) {
                        clearInterval(tick);
                        div.classList.add('fade-out');
                        setTimeout(() => div.remove(), 400);
                    } else {
                        badgeEl.textContent = remaining + 's';
                    }
                }, 1000);
            }
            buildMediaMarkup(type, fileId) {
                if (type === 'image') {
                    return `<img class="media-frame" src="https://drive.google.com/thumbnail?id=${fileId}&sz=w1000" alt="Imagem">`;
                }
                return `<iframe class="media-frame" src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay"></iframe>`;
            }
            renderMessage(msg) {
                const container = document.getElementById('messages-container');
                const hint = document.getElementById('chat-empty-hint');
                if (hint) hint.remove();

                const div = document.createElement('div');
                const isMine = msg.senderId === this.currentUser.id;
                div.className = `msg ${isMine ? 'sent' : 'received'}`;

                const senderInfo = (!isMine && this.currentGroup && this.currentGroup.type === 'group' && this.chatUserMap)
                    ? this.chatUserMap[msg.senderId] : null;
                if (senderInfo) {
                    const label = document.createElement('span');
                    label.className = 'msg-sender-label';
                    label.textContent = `${senderInfo.emoji} ${senderInfo.name}`;
                    div.appendChild(label);
                }

                if (msg.type === 'text') {
                    const row = document.createElement('div');
                    row.className = 'msg-row';
                    const textEl = document.createElement('span');
                    textEl.className = 'msg-text';
                    textEl.innerText = msg.content;
                    const badge = document.createElement('span');
                    badge.className = 'ttl-badge';
                    row.appendChild(textEl);
                    row.appendChild(badge);
                    div.appendChild(row);
                    container.appendChild(div);
                    this.scrollToBottom();
                    this.startCountdown(div, badge, this.MESSAGE_LIFESPAN);
                } else {
                    div.classList.add('msg-media');
                    const lockRow = document.createElement('div');
                    lockRow.className = 'media-lock-row';
                    lockRow.innerHTML = (ICONS.lock || '') + (ICONS[msg.type] || ICONS.image);
                    const lockText = document.createElement('span');
                    lockText.textContent = `Toque para ver ${MEDIA_LABEL[msg.type] || 'a mídia'}`;
                    lockRow.appendChild(lockText);
                    div.appendChild(lockRow);
                    lockRow.addEventListener('click', () => this.revealMedia(div, msg), { once: true });
                    container.appendChild(div);
                    this.scrollToBottom();
                }
                return div;
            }
            revealMedia(div, msg) {
                const label = div.querySelector('.msg-sender-label');
                div.innerHTML = '';
                if (label) div.appendChild(label);
                div.insertAdjacentHTML('beforeend', this.buildMediaMarkup(msg.type, msg.content));
                const footer = document.createElement('div');
                footer.className = 'media-footer';
                const badge = document.createElement('span');
                badge.className = 'ttl-badge';
                footer.appendChild(badge);
                div.appendChild(footer);
                this.startCountdown(div, badge, this.MEDIA_LIFESPAN);
            }
            renderUploadingPlaceholder() {
                const container = document.getElementById('messages-container');
                const hint = document.getElementById('chat-empty-hint');
                if (hint) hint.remove();
                const div = document.createElement('div');
                div.className = 'msg sent uploading';
                const span = document.createElement('span');
                span.className = 'msg-text';
                span.textContent = 'Enviando mídia…';
                div.appendChild(span);
                container.appendChild(div);
                this.scrollToBottom();
                return div;
            }
            async sendTextMessage() {
                const input = document.getElementById('msg-input');
                const content = input.value.trim();
                if (!content || !this.currentGroup) return;
                input.value = '';
                this.renderMessage({ senderId: this.currentUser.id, content, type: 'text', timestamp: Date.now() });
                try {
                    const res = await this.request('sendMessage', {
                        groupId: this.currentGroup.id, senderId: this.currentUser.id,
                        content, type: 'text', mimeType: 'text/plain'
                    });
                    this.lastSync = Math.max(this.lastSync, res.timestamp);
                } catch (e) { /* toast já exibido */ }
            }
            // === ANEXOS (galeria / câmera) ===
            toggleAttachTray() {
                const tray = document.getElementById('attach-tray');
                const btn = document.getElementById('attach-toggle-btn');
                const isOpen = tray.classList.toggle('open');
                btn.classList.toggle('open', isOpen);
            }
            closeAttachTray() {
                document.getElementById('attach-tray').classList.remove('open');
                document.getElementById('attach-toggle-btn').classList.remove('open');
            }
            triggerFile(id) {
                document.getElementById(id).click();
                this.closeAttachTray();
            }
            async handleMedia(event) {
                const file = event.target.files[0];
                event.target.value = '';
                if (!file || !this.currentGroup) return;
                if (file.size > 8 * 1024 * 1024) return this.toast('Arquivo excede 8MB.');
                const type = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : 'audio';
                await this.uploadAndSendMedia(file, type, file.type);
            }
            async uploadAndSendMedia(fileOrBlob, type, mimeType) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const placeholder = this.renderUploadingPlaceholder();
                    try {
                        const res = await this.request('sendMessage', {
                            groupId: this.currentGroup.id, senderId: this.currentUser.id,
                            content: e.target.result, type, mimeType
                        });
                        this.lastSync = Math.max(this.lastSync, res.timestamp);
                        placeholder.remove();
                        this.renderMessage({ senderId: this.currentUser.id, content: res.fileId, type, timestamp: res.timestamp });
                    } catch (err) {
                        placeholder.remove();
                    }
                };
                reader.readAsDataURL(fileOrBlob);
            }
            // === ÁUDIO (microfone) ===
            async toggleRecording() {
                this.closeAttachTray();
                if (this.isRecording) { this.stopRecording(true); return; }
                if (!navigator.mediaDevices || !window.MediaRecorder) {
                    return this.toast('Gravação de áudio não é suportada neste navegador.');
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.currentStream = stream;
                    this.recordedChunks = [];
                    this.mediaRecorder = new MediaRecorder(stream);
                    this.mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) this.recordedChunks.push(e.data); };
                    this.mediaRecorder.start();
                    this.isRecording = true;
                    this.recordingStart = Date.now();
                    this.showRecordingUI();
                } catch (e) {
                    this.toast('Não foi possível acessar o microfone.');
                }
            }
            showRecordingUI() {
                document.getElementById('bottom-input-bar').classList.add('hidden');
                document.getElementById('recording-bar').classList.add('open');
                this.recTimer = setInterval(() => {
                    const secs = Math.floor((Date.now() - this.recordingStart) / 1000);
                    const mm = String(Math.floor(secs / 60)).padStart(2, '0');
                    const ss = String(secs % 60).padStart(2, '0');
                    document.getElementById('recording-time').textContent = `${mm}:${ss}`;
                }, 500);
            }
            hideRecordingUI() {
                clearInterval(this.recTimer);
                document.getElementById('recording-bar').classList.remove('open');
                document.getElementById('bottom-input-bar').classList.remove('hidden');
                document.getElementById('recording-time').textContent = '00:00';
            }
            cancelRecording() { this.stopRecording(false); }
            stopRecording(send) {
                if (!this.mediaRecorder || !this.isRecording) return;
                this.isRecording = false;
                const recorder = this.mediaRecorder;
                const mimeType = recorder.mimeType || 'audio/webm';
                this.mediaRecorder = null;
                recorder.onstop = async () => {
                    if (this.currentStream) this.currentStream.getTracks().forEach(t => t.stop());
                    this.currentStream = null;
                    this.hideRecordingUI();
                    const chunks = this.recordedChunks;
                    this.recordedChunks = [];
                    if (!send || !chunks.length) return;
                    const blob = new Blob(chunks, { type: mimeType });
                    if (blob.size === 0 || !this.currentGroup) return;
                    await this.uploadAndSendMedia(blob, 'audio', mimeType);
                };
                recorder.stop();
            }
            setupGlobalHandlers() {
                document.getElementById('msg-input').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); this.sendTextMessage(); }
                });
                document.addEventListener('click', (e) => {
                    const tray = document.getElementById('attach-tray');
                    const btn = document.getElementById('attach-toggle-btn');
                    if (tray.classList.contains('open') && !tray.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
                        this.closeAttachTray();
                    }
                });
            }
        }

        const App = new PhantomCore();
    </script>
</body>
</html>
